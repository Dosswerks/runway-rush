<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runway Rush</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a2a;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:Arial,Helvetica,sans-serif;font-weight:bold;color:#fff;overflow-x:hidden;overflow-y:auto;padding-top:env(safe-area-inset-top)}
#game-wrapper{position:relative;width:640px;max-width:100vw;border:2px solid #1a3366;overflow:hidden}
canvas{display:block;width:100%;height:auto;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
#ui{width:640px;max-width:100vw;display:flex;justify-content:space-between;padding:8px 8px;font-size:15px;background:#111;border:1px solid #333}
#gate-display{width:640px;max-width:100vw;text-align:center;padding:6px 0;font-size:20px;color:#ffcc00;background:#1a1a3a;letter-spacing:2px}
#start-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a2a;z-index:10;cursor:pointer}
#start-screen.has-box-art{gap:0}
#start-screen h1{font-size:42px;color:#ffcc00}
#start-screen p{font-size:15px;color:#ccc;text-align:center;margin:4px 0}
#box-art-container{position:relative;width:100%;flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#0a0a2a}
#box-art{display:block;width:100%;height:100%;object-fit:contain}
#start-screen.has-box-art p{position:absolute;color:#fff;font-size:15px;text-shadow:0 2px 6px rgba(0,0,0,0.9);z-index:11}
#start-screen.has-box-art p:nth-child(3){bottom:52px}
#start-screen.has-box-art p:nth-child(4){bottom:30px}
#start-screen.has-box-art p:last-child{bottom:8px}
.has-box-art #splash-title{display:none}
.hidden{display:none!important}
@media(max-width:660px){
    #game-wrapper{width:100vw;border-width:1px}
    #ui{font-size:12px;padding:6px 6px}
    #gate-display{font-size:14px;padding:4px 0}
    #start-screen h1{font-size:30px}
    #start-screen p{font-size:12px}
    #links a{font-size:15px!important}
}
</style>
</head>
<body>
<div id="gate-display" class="hidden">✈ NOW DEPARTING: GATE <span id="target-gate">1</span> ✈</div>
<div id="ui">
<span>BOARDED: <span id="passengers">0</span>/5</span>
<span>LIVES: <span id="lives">5</span></span>
<span>TIME: <span id="timer">30</span></span>
<span>SCORE: <span id="score">0</span></span>
<span>LEVEL: <span id="level">1</span></span>
</div>
<div id="game-wrapper">
<canvas id="game" width="640" height="480"></canvas>
<div id="start-screen">
<div id="box-art-container" class="hidden"><img id="box-art" src="" alt="Runway Rush"></div>
<h1 id="splash-title">RUNWAY RUSH</h1>
<p>Use arrow keys or swipe to move</p>
<p>Get each passenger to their gate!</p>
<p>Click or tap to start</p>
</div>
</div>
<div id="links" style="width:640px;max-width:100vw;text-align:center;padding:10px 0;z-index:20;position:relative;">
    <a href="story.html" target="_blank" style="color:#ffcc00;font-size:18px;text-decoration:none;">📖 READ THE STORY! 📖</a>
</div>
<script>
// =============================================================
// CUSTOMIZATION
// =============================================================
const CUSTOM_ASSETS = {
    boxArtImage: 'assets/box-art.png',
    playerImages: ['assets/passenger1.png','assets/passenger2.png','assets/passenger3.png','assets/passenger4.png','assets/passenger5.png'],
    terminalObs1: 'assets/crowd.png',
    terminalObs2: 'assets/security.png',
    terminalObs3: 'assets/luggage.png',
    runwayObs1: 'assets/truck.png',
    runwayObs2: 'assets/baggage-train.png',
    runwayObs3: 'assets/airplane.png',
    collectibleImage: 'assets/collectible.png',
    gateFilledImage: 'assets/gate-filled.png', // shown in gate when passenger delivered (120x36)
    startAreaImage: 'assets/start-area.png',
    checkpointImage: 'assets/checkpoint.png', // 640x40 background for security checkpoint
    sirenImage: 'assets/siren.png',
    npsImage: 'assets/nps.png', // 200x200 shown on level complete screen // 24x24 siren light graphic, flashes alternately // 640x120 background for starting rows
    backgroundMusic: 'assets/music.mp3',
    moveSound: 'assets/move.mp3',
    crashSound: 'assets/crash.mp3',
    gateSound: 'assets/gate.mp3',
    collectSound: 'assets/collect.mp3',
    levelUpSound: 'assets/levelup.mp3',
};
// =============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 640, H = 480;

// High-DPI canvas scaling
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr;
canvas.height = H * dpr;
canvas.style.width = '';
canvas.style.height = '';
ctx.scale(dpr, dpr);

const COLS = 16, CELL = W / COLS;
const ROWS = 16, LANE_H = H / ROWS;
const startScreen = document.getElementById('start-screen');
const images = {}, sounds = {};
function loadImage(k,s){return new Promise(r=>{if(!s)return r();const i=new Image();i.onload=()=>{images[k]=i;r()};i.onerror=()=>r();i.src=s})}
function loadSound(k,s){if(!s)return;sounds[k]=new Audio(s);sounds[k].volume=0.5}
function loadMusic(s){if(!s)return;sounds.music=new Audio(s);sounds.music.loop=true;sounds.music.volume=0.3}
function startMusic(){if(sounds.music&&sounds.music.paused)sounds.music.play().catch(()=>{})}
function stopMusic(){if(sounds.music){sounds.music.pause();sounds.music.currentTime=0}}
function playSound(k){if(sounds[k]){sounds[k].currentTime=0;sounds[k].play().catch(()=>{})}}

// Passenger colors/styles
const PCOLORS = ['#ff6644','#44aaff','#44dd44','#ffaa00','#dd44dd'];
const PNAMES = ['Business','Tourist','Family','Student','Senior'];
// Lane definitions: row 0=top (gates), row 15=bottom (start)
// Rows 0: gates
// Rows 1-3: runway lanes (fast, dangerous, baggage trains)
// Row 4: safe zone (middle)
// Rows 5-7: terminal lanes (slower obstacles)
// Rows 8+: more terminal / start area
// We'll use rows 0-15 mapped to y positions

const LANE_TYPES = [];
// Row 0: Gates
// Row 1: runway - planes (very fast, large)
// Row 2: runway - baggage train (rideable)
// Row 3: runway - service trucks
// Row 4: runway - baggage train (rideable)
// Row 5: runway - planes
// Row 6: safe zone
// Row 7: terminal - luggage carts
// Row 8: terminal - security carts
// Row 9: terminal - walking passengers
// Row 10: terminal - luggage carts
// Row 11: terminal - security carts
// Row 12: terminal - walking passengers
// Row 13: safe start area
// Row 14: safe start area
// Row 15: start position

let game = {};
let lanes = [];
function buildLanes(speedMult) {
    lanes = [];
    const sm = speedMult || 1;
    for (let r = 0; r < ROWS; r++) {
        const dir = r % 2 === 0 ? 1 : -1;
        let lane = { row: r, type: 'safe', obstacles: [], dir, speed: 0, rideable: false };
        if (r === 0) { lane.type = 'gates'; }
        else if (r === 1) { lane.type = 'runway'; lane.speed = 1.25 * sm; lane.obsType = 'plane'; lane.obsW = 128; lane.count = 1; }
        else if (r === 2) { lane.type = 'runway'; lane.speed = 0.75 * sm; lane.obsType = 'baggage'; lane.obsW = 96; lane.count = 2; lane.rideable = true; }
        else if (r === 3) { lane.type = 'runway'; lane.speed = 1.0 * sm * dir; lane.obsType = 'truck'; lane.obsW = 64; lane.count = 2; }
        else if (r === 4) { lane.type = 'runway'; lane.speed = -0.6 * sm; lane.obsType = 'baggage'; lane.obsW = 96; lane.count = 2; lane.rideable = true; }
        else if (r === 5) { lane.type = 'runway'; lane.speed = -1.4 * sm; lane.obsType = 'plane'; lane.obsW = 128; lane.count = 1; }
        else if (r === 6) { lane.type = 'safe'; }
        else if (r === 7) { lane.type = 'terminal'; lane.speed = 0.5 * sm * dir; lane.obsType = 'luggage'; lane.obsW = 56; lane.count = 3; }
        else if (r === 8) { lane.type = 'terminal'; lane.speed = 0.7 * sm * dir; lane.obsType = 'security'; lane.obsW = 56; lane.count = 2; }
        else if (r === 9) { lane.type = 'terminal'; lane.speed = 0.4 * sm * dir; lane.obsType = 'crowd'; lane.obsW = 96; lane.count = 3; }
        else if (r === 10) { lane.type = 'terminal'; lane.speed = 0.6 * sm * dir; lane.obsType = 'luggage'; lane.obsW = 56; lane.count = 2; }
        else if (r === 11) { lane.type = 'terminal'; lane.speed = 0.75 * sm * dir; lane.obsType = 'security'; lane.obsW = 56; lane.count = 3; }
        else if (r === 12) { lane.type = 'terminal'; lane.speed = 0.45 * sm * dir; lane.obsType = 'crowd'; lane.obsW = 96; lane.count = 3; }
        else { lane.type = 'safe'; }
        // spawn obstacles
        if (lane.count) {
            const spacing = W / lane.count;
            for (let i = 0; i < lane.count; i++) {
                lane.obstacles.push({ x: i * spacing + Math.random() * 40, w: lane.obsW, h: LANE_H - 4 });
            }
        }
        lanes.push(lane);
    }
}
function initGame() {
    const gateOrder = [1,2,3,4,5];
    // shuffle gates
    for (let i = gateOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [gateOrder[i], gateOrder[j]] = [gateOrder[j], gateOrder[i]];
    }
    // shuffle passenger appearance order
    const passengerOrder = [0,1,2,3,4];
    for (let i = passengerOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [passengerOrder[i], passengerOrder[j]] = [passengerOrder[j], passengerOrder[i]];
    }
    buildLanes(1);
    game = {
        running: false, over: false, won: false,
        px: Math.floor(COLS / 2) * CELL, py: (ROWS - 1) * LANE_H,
        row: ROWS - 1,
        riding: null,
        passengersSaved: 0,
        gateOrder: gateOrder,
        passengerOrder: passengerOrder,
        currentTarget: gateOrder[0],
        currentPassenger: passengerOrder[0],
        gatesFilled: [false,false,false,false,false],
        score: 0,
        lives: 5,
        level: 1,
        timeLeft: 30,
        lastTime: 0,
        collectibles: [],
        moveCD: 0,
        runwayGrace: null,
        totalMoves: 0,
        levelComplete: false,
        npsScore: 0,
    };
    spawnCollectibles();
    updateUI();
}

function spawnCollectibles() {
    game.collectibles = [];
    for (let i = 0; i < 3; i++) {
        let row;
        do { row = 3 + Math.floor(Math.random() * 10); } while (row === 2 || row === 4 || row === 6);
        game.collectibles.push({
            x: Math.random() * (W - 24),
            y: row * LANE_H + 8,
            w: 24, h: 24, alive: true
        });
    }
}

function updateUI() {
    document.getElementById('passengers').textContent = game.passengersSaved;
    document.getElementById('lives').textContent = game.lives;
    document.getElementById('timer').textContent = Math.max(0, Math.ceil(game.timeLeft));
    document.getElementById('score').textContent = game.score;
    document.getElementById('level').textContent = game.level;
    document.getElementById('target-gate').textContent = game.currentTarget;
}
function advanceLevel() {
    game.level++;
    game.passengersSaved = 0;
    game.gatesFilled = [false,false,false,false,false];
    game.totalMoves = 0;
    game.levelComplete = false;
    const go = [1,2,3,4,5];
    for (let i = go.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[go[i],go[j]]=[go[j],go[i]]}
    game.gateOrder = go;
    const po = [0,1,2,3,4];
    for (let i = po.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[po[i],po[j]]=[po[j],po[i]]}
    game.passengerOrder = po;
    game.currentPassenger = po[0];
    game.currentTarget = go[0];
    document.getElementById('gate-display').innerHTML = '✈ NOW DEPARTING: GATE <span id="target-gate">' + game.currentTarget + '</span> ✈';
    buildLanes(1 + game.level * 0.15);
    spawnCollectibles();
    resetPassenger();
    playSound('levelUp');
    startMusic();
    updateUI();
}

function resetPassenger() {
    game.px = Math.floor(COLS / 2) * CELL;
    game.py = (ROWS - 1) * LANE_H;
    game.row = ROWS - 1;
    game.riding = null;
    game.runwayGrace = null;
    game.timeLeft = Math.max(20, 32 - game.level * 2);
}

function nextPassenger() {
    game.passengersSaved++;
    game.score += 100 + Math.ceil(game.timeLeft) * 10;
    playSound('gate');
    if (game.passengersSaved >= 5) {
        // Calculate NPS — optimal is ~15 moves per passenger (75 total for 5)
        const optimalMoves = 75;
        const efficiency = Math.max(0, Math.min(100, Math.round((optimalMoves / Math.max(game.totalMoves, optimalMoves)) * 100)));
        game.npsScore = efficiency;
        game.levelComplete = true;
        game.py = -100; // Hide player off screen
        document.getElementById('target-gate').parentElement.innerHTML = '✈ DEPARTED ✈';
        stopMusic();
        playSound('levelUp');
        updateUI();
        return;
    } else {
        game.currentPassenger = game.passengerOrder[game.passengersSaved];
        game.currentTarget = game.gateOrder[game.passengersSaved];
    }
    resetPassenger();
    updateUI();
}

function killPassenger() {
    playSound('crash');
    game.lives--;
    if (game.lives <= 0) {
        game.over = true;
        stopMusic();
    }
    resetPassenger();
    updateUI();
}
function movePlayer(dx, dy) {
    if (!game.running || game.over || game.moveCD > 0) return;
    game.moveCD = 6;
    let newX = game.px + dx * CELL;
    let newY = game.py + dy * LANE_H;
    let newRow = Math.round(newY / LANE_H);

    // Skip empty start area rows: jump between row 15 and row 12
    if (game.row === ROWS - 1 && dy === -1) {
        newY = 12 * LANE_H;
        newRow = 12;
    } else if (game.row === 12 && dy === 1) {
        newY = (ROWS - 1) * LANE_H;
        newRow = ROWS - 1;
    } else if (newRow >= 13 && newRow <= 14) {
        // Block movement into the empty middle start rows
        return;
    }

    if (newX < 0 || newX >= W - CELL/2) return;
    if (newY < 0 || newY > (ROWS - 1) * LANE_H) return;
    game.px = newX;
    game.py = newY;
    game.row = newRow;
    game.riding = null;
    playSound('move');
    game.totalMoves++;

    // Check gate arrival
    if (game.row === 0) {
        const gateIdx = Math.floor(game.px / (W / 5));
        const gateNum = gateIdx + 1;
        if (gateNum === game.currentTarget && !game.gatesFilled[gateIdx]) {
            game.gatesFilled[gateIdx] = true;
            nextPassenger();
        } else {
            // Wrong gate — bounce back
            game.py = LANE_H;
            game.row = 1;
        }
    }
}

function update(dt) {
    if (!game.running || game.over) return;
    if (game.levelComplete) return; // Pause during NPS screen
    game.timeLeft -= dt;
    if (game.moveCD > 0) game.moveCD--;
    if (game.timeLeft <= 0) {
        game.timeLeft = 0;
        game.over = true;
        stopMusic();
        updateUI();
        return;
    }

    // Move obstacles
    for (const lane of lanes) {
        if (lane.type === 'safe' || lane.type === 'gates') continue;
        for (const obs of lane.obstacles) {
            obs.x += lane.speed;
            if (lane.speed > 0 && obs.x > W + obs.w) obs.x = -obs.w;
            if (lane.speed < 0 && obs.x < -obs.w) obs.x = W + obs.w;
        }
    }

    // Riding baggage train
    if (game.riding) {
        game.px += game.riding.speed;
        if (game.px < -CELL || game.px > W + CELL) {
            killPassenger();
            return;
        }
    }

    // Collision detection
    const pRow = game.row;
    if (pRow > 0 && pRow < ROWS) {
        const lane = lanes[pRow];
        const pb = { x: game.px + 4, y: game.py + 4, w: CELL - 8, h: LANE_H - 8 };

        if (lane.type === 'terminal') {
            for (const obs of lane.obstacles) {
                const ob = { x: obs.x, y: pRow * LANE_H, w: obs.w, h: obs.h };
                if (pb.x < ob.x + ob.w && pb.x + pb.w > ob.x && pb.y < ob.y + ob.h && pb.y + pb.h > ob.y) {
                    killPassenger();
                    return;
                }
            }
        }

        if (lane.type === 'runway') {
            if (lane.rideable) {
                let onPlatform = false;
                for (const obs of lane.obstacles) {
                    const ob = { x: obs.x, y: pRow * LANE_H, w: obs.w, h: obs.h };
                    if (pb.x + pb.w > ob.x && pb.x < ob.x + ob.w && pb.y < ob.y + ob.h && pb.y + pb.h > ob.y) {
                        onPlatform = true;
                        game.riding = { speed: lane.speed };
                    }
                }
                if (!onPlatform) {
                    game.riding = null;
                    // Grace: only die if you've been off a platform for a moment
                    if (!game.runwayGrace) {
                        game.runwayGrace = 0.4; // seconds of grace
                    } else {
                        game.runwayGrace -= dt;
                        if (game.runwayGrace <= 0) {
                            game.runwayGrace = null;
                            killPassenger();
                            return;
                        }
                    }
                } else {
                    game.runwayGrace = null;
                }
            } else {
                for (const obs of lane.obstacles) {
                    const ob = { x: obs.x, y: pRow * LANE_H, w: obs.w, h: obs.h };
                    if (pb.x < ob.x + ob.w && pb.x + pb.w > ob.x && pb.y < ob.y + ob.h && pb.y + pb.h > ob.y) {
                        killPassenger();
                        return;
                    }
                }
            }
        }
    }

    // Collectibles
    const pb = { x: game.px + 4, y: game.py + 4, w: CELL - 8, h: LANE_H - 8 };
    for (const c of game.collectibles) {
        if (!c.alive) continue;
        if (pb.x < c.x + c.w && pb.x + pb.w > c.x && pb.y < c.y + c.h && pb.y + pb.h > c.y) {
            c.alive = false;
            game.score += 50;
            playSound('collect');
            updateUI();
        }
    }

    updateUI();
}
function draw() {
    ctx.clearRect(0, 0, W, H);

    // Draw lane backgrounds
    for (let r = 0; r < ROWS; r++) {
        const y = r * LANE_H;
        const lane = lanes[r];
        if (lane.type === 'gates') {
            ctx.fillStyle = '#1a3366';
            ctx.fillRect(0, y, W, LANE_H);
            // Draw 5 gates
            const gw = W / 5;
            for (let g = 0; g < 5; g++) {
                const gx = g * gw;
                ctx.fillStyle = game.gatesFilled[g] ? '#3388bb' : '#2a4488';
                ctx.fillRect(gx + 2, y + 2, gw - 4, LANE_H - 4);
                ctx.strokeStyle = game.currentTarget === g + 1 ? '#ffcc00' : '#4466aa';
                ctx.lineWidth = game.currentTarget === g + 1 ? 3 : 1;
                ctx.strokeRect(gx + 2, y + 2, gw - 4, LANE_H - 4);
                if (game.gatesFilled[g] && images.gateFilled) {
                    ctx.drawImage(images.gateFilled, gx + 4, y + 2, gw - 8, LANE_H - 4);
                } else if (game.gatesFilled[g]) {
                    ctx.fillStyle = '#aaddff';
                    ctx.font = 'bold 11px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('BOARDED', gx + gw/2, y + LANE_H/2 + 4);
                    ctx.textAlign = 'left';
                } else {
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 10px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('GATE', gx + gw/2, y + 12);
                    ctx.font = 'bold 14px Arial';
                    ctx.fillText(g + 1, gx + gw/2, y + LANE_H - 4);
                    ctx.textAlign = 'left';
                }
            }
            ctx.textAlign = 'left';
        } else if (lane.type === 'runway') {
            ctx.fillStyle = r % 2 === 0 ? '#3a3a3a' : '#333';
            ctx.fillRect(0, y, W, LANE_H);
            if (lane.rideable) {
                // Hazard stripes on baggage train lanes — yellow and black
                ctx.fillStyle = '#222';
                ctx.fillRect(0, y, W, LANE_H);
                const stripeW = 20;
                ctx.save();
                ctx.beginPath();
                ctx.rect(0, y, W, LANE_H);
                ctx.clip();
                for (let sx = -LANE_H; sx < W + LANE_H; sx += stripeW * 2) {
                    ctx.fillStyle = 'rgba(255,220,0,0.5)';
                    ctx.beginPath();
                    ctx.moveTo(sx, y);
                    ctx.lineTo(sx + stripeW, y);
                    ctx.lineTo(sx + stripeW + LANE_H, y + LANE_H);
                    ctx.lineTo(sx + LANE_H, y + LANE_H);
                    ctx.fill();
                }
                ctx.restore();
                // Warning text
                ctx.fillStyle = 'rgba(255,220,0,0.6)';
                ctx.font = 'bold 9px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⚠ ACTIVE RUNWAY - DO NOT WALK ⚠', W / 2, y + LANE_H / 2 + 3);
                ctx.textAlign = 'left';
            } else {
                // Regular runway markings
                ctx.strokeStyle = '#666';
                ctx.setLineDash([20, 15]);
                ctx.beginPath();
                ctx.moveTo(0, y + LANE_H / 2);
                ctx.lineTo(W, y + LANE_H / 2);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        } else if (lane.type === 'terminal') {
            const greys = ['#888','#999','#7a7a7a','#aaa','#8a8a8a','#949494'];
            ctx.fillStyle = greys[r % greys.length];
            ctx.fillRect(0, y, W, LANE_H);
            // Floor pattern — people mover / escalator lines
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1;
            for (let lx = 0; lx < W; lx += 20) {
                ctx.beginPath();
                ctx.moveTo(lx, y);
                ctx.lineTo(lx, y + LANE_H);
                ctx.stroke();
            }
        } else {
            // Safe zones
            if (r === 6) {
                ctx.fillStyle = '#1a3366';
                ctx.fillRect(0, y, W, LANE_H);
                // Custom background
                if (images.checkpoint) {
                    ctx.drawImage(images.checkpoint, 0, y, W, LANE_H);
                }
                // Siren lights — alternate flash
                const sirenOn = Math.floor(Date.now() / 400) % 2 === 0;
                if (images.siren) {
                    // Left siren
                    ctx.globalAlpha = sirenOn ? 1.0 : 0.3;
                    ctx.drawImage(images.siren, W/2 - 142, y + LANE_H/2 - 12, 24, 24);
                    // Right siren
                    ctx.globalAlpha = sirenOn ? 0.3 : 1.0;
                    ctx.drawImage(images.siren, W/2 + 118, y + LANE_H/2 - 12, 24, 24);
                    ctx.globalAlpha = 1.0;
                } else {
                    // Default drawn sirens
                    ctx.fillStyle = sirenOn ? '#ff0000' : '#880000';
                    ctx.beginPath();
                    ctx.arc(W/2 - 130, y + LANE_H/2, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = sirenOn ? '#880000' : '#ff0000';
                    ctx.beginPath();
                    ctx.arc(W/2 + 130, y + LANE_H/2, 6, 0, Math.PI * 2);
                    ctx.fill();
                    if (sirenOn) {
                        ctx.fillStyle = 'rgba(255,0,0,0.15)';
                        ctx.beginPath();
                        ctx.arc(W/2 - 130, y + LANE_H/2, 16, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillStyle = 'rgba(255,0,0,0.15)';
                        ctx.beginPath();
                        ctx.arc(W/2 + 130, y + LANE_H/2, 16, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                // Label
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('— SECURITY CHECKPOINT —', W/2, y + LANE_H/2 + 4);
                ctx.textAlign = 'left';
            } else {
                // Starting / safe area
                if (r >= 13 && images.startArea) {
                    const startY = 13 * LANE_H;
                    if (r === 13) {
                        ctx.drawImage(images.startArea, 0, startY, W, LANE_H * 3);
                    }
                } else {
                    ctx.fillStyle = '#2a4a6a';
                    ctx.fillRect(0, y, W, LANE_H);
                }
            }
        }
    }

    if (!game.running && !game.over) return;

    // Draw collectibles (before obstacles so obstacles render on top)
    for (const c of game.collectibles) {
        if (!c.alive) continue;
        if (images.collectible) {
            ctx.drawImage(images.collectible, c.x, c.y, c.w, c.h);
        } else {
            ctx.fillStyle = '#ffdd00';
            ctx.beginPath();
            ctx.arc(c.x + 12, c.y + 12, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#aa8800';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('★', c.x + 12, c.y + 17);
            ctx.textAlign = 'left';
        }
    }

function drawFlipped(img, x, y, w, h, flipH) {
    if (!flipH) { ctx.drawImage(img, x, y, w, h); return; }
    ctx.save();
    ctx.translate(x + w, y);
    ctx.scale(-1, 1);
    ctx.drawImage(img, 0, 0, w, h);
    ctx.restore();
}

    // Draw obstacles
    for (const lane of lanes) {
        if (lane.type === 'safe' || lane.type === 'gates') continue;
        const y = lane.row * LANE_H;
        const flip = lane.speed < 0;
        for (const obs of lane.obstacles) {
            if (lane.type === 'terminal') {
                // Check for custom images
                const imgKey = { crowd: 'terminalObs1', security: 'terminalObs2', luggage: 'terminalObs3' }[lane.obsType];
                if (imgKey && images[imgKey]) {
                    drawFlipped(images[imgKey], obs.x, y + 2, obs.w, obs.h, flip);
                } else {
                    const colors = { crowd: '#aa7744', security: '#ffcc00', luggage: '#8888aa' };
                    ctx.fillStyle = colors[lane.obsType] || '#aa7744';
                    ctx.fillRect(obs.x, y + 2, obs.w, obs.h);
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 10px Arial';
                    ctx.textAlign = 'center';
                    const labels = { crowd: 'CROWD', security: 'SECURITY', luggage: 'LUGGAGE' };
                    ctx.fillText(labels[lane.obsType] || '', obs.x + obs.w/2, y + LANE_H/2 + 4);
                    ctx.textAlign = 'left';
                }
            } else if (lane.type === 'runway') {
                if (lane.obsType === 'plane') {
                    if (images.runwayObs3) {
                        drawFlipped(images.runwayObs3, obs.x, y + 2, obs.w, obs.h, flip);
                    } else {
                        ctx.fillStyle = '#ddd';
                        ctx.fillRect(obs.x, y + 2, obs.w, obs.h);
                        ctx.fillStyle = '#4488cc';
                        ctx.fillRect(obs.x + 10, y + 6, obs.w - 20, obs.h - 8);
                        ctx.fillStyle = '#333';
                        ctx.font = 'bold 10px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText('✈ AIRPLANE', obs.x + obs.w/2, y + LANE_H/2 + 4);
                        ctx.textAlign = 'left';
                    }
                } else if (lane.obsType === 'baggage') {
                    if (images.runwayObs2) {
                        drawFlipped(images.runwayObs2, obs.x, y + 2, obs.w, obs.h, flip);
                    } else {
                        ctx.fillStyle = '#dd8800';
                        ctx.fillRect(obs.x, y + 2, obs.w, obs.h);
                        for (let b = 0; b < 3; b++) {
                            ctx.fillStyle = '#aa6600';
                            ctx.fillRect(obs.x + 4 + b * 30, y + 6, 26, obs.h - 8);
                        }
                        ctx.fillStyle = '#fff';
                        ctx.font = 'bold 9px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText('BAGGAGE TRAIN', obs.x + obs.w/2, y + LANE_H/2 + 3);
                        ctx.textAlign = 'left';
                    }
                } else {
                    if (images.runwayObs1) {
                        drawFlipped(images.runwayObs1, obs.x, y + 2, obs.w, obs.h, flip);
                    } else {
                        ctx.fillStyle = '#cc4444';
                        ctx.fillRect(obs.x, y + 2, obs.w, obs.h);
                        ctx.fillStyle = '#fff';
                        ctx.font = 'bold 10px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText('TRUCK', obs.x + obs.w/2, y + LANE_H/2 + 4);
                        ctx.textAlign = 'left';
                    }
                }
            }
        }
    }

    // Draw player (hide during level complete)
    if (!game.levelComplete) {
    const pi = game.currentPassenger;
    const pKey = 'passenger' + pi;
    if (images[pKey]) {
        ctx.drawImage(images[pKey], game.px + 2, game.py + 2, CELL - 4, LANE_H - 4);
    } else {
        ctx.fillStyle = PCOLORS[pi];
        ctx.fillRect(game.px + 6, game.py + 4, CELL - 12, LANE_H - 8);
        // Head
        ctx.beginPath();
        ctx.arc(game.px + CELL/2, game.py + 10, 8, 0, Math.PI * 2);
        ctx.fill();
    }
    }

    // Level complete — NPS screen
    if (game.levelComplete) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, W, H);

        // NPS graphic
        if (images.nps) {
            ctx.drawImage(images.nps, W/2 - 100, 100, 200, 200);
        }

        const topY = images.nps ? 340 : 180;

        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 36px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('ALL PASSENGERS BOARDED!', W/2, topY);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 24px Arial';
        ctx.fillText('Your NPS Score:', W/2, topY + 50);

        // NPS percentage — color coded
        const nps = game.npsScore;
        ctx.fillStyle = nps >= 80 ? '#44ff44' : nps >= 50 ? '#ffcc00' : '#ff4444';
        ctx.font = 'bold 60px Arial';
        ctx.fillText(nps + '%', W/2, topY + 120);

        // Encouragement
        ctx.fillStyle = '#aaa';
        ctx.font = 'bold 16px Arial';
        if (nps >= 90) {
            ctx.fillText('Outstanding! Nearly perfect routing!', W/2, topY + 160);
        } else if (nps >= 70) {
            ctx.fillText('Great job! Can you be more efficient?', W/2, topY + 160);
        } else if (nps >= 50) {
            ctx.fillText('Not bad! Try fewer moves next time.', W/2, topY + 160);
        } else {
            ctx.fillText('Keep practicing! Aim for a direct route.', W/2, topY + 160);
        }

        ctx.fillStyle = '#ccc';
        ctx.font = 'bold 18px Arial';
        ctx.fillText('Tap or press SPACE for next level', W/2, topY + 210);
        ctx.textAlign = 'left';
    }

    // Game over
    if (game.over) {
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 44px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', W/2, H/2 - 30);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 20px Arial';
        ctx.fillText('Score: ' + game.score, W/2, H/2 + 10);
        ctx.fillText('Passengers Saved: ' + game.passengersSaved, W/2, H/2 + 40);
        ctx.fillText('Tap or press R to restart', W/2, H/2 + 74);
        ctx.textAlign = 'left';
    }
}
let lastTS = 0;
function gameLoop(ts) {
    const dt = Math.min((ts - lastTS) / 1000, 0.05);
    lastTS = ts;
    update(dt);
    draw();
    requestAnimationFrame(gameLoop);
}

// Start
function startGame() {
    if (!game.running && !game.over) {
        game.running = true;
        startScreen.classList.add('hidden');
        document.getElementById('gate-display').classList.remove('hidden');
        startMusic();
    }
}
startScreen.addEventListener('click', startGame);
startScreen.addEventListener('touchstart', e => { e.preventDefault(); startGame(); }, { passive: false });

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp') { e.preventDefault(); movePlayer(0, -1); }
    if (e.key === 'ArrowDown') { e.preventDefault(); movePlayer(0, 1); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); movePlayer(-1, 0); }
    if (e.key === 'ArrowRight') { e.preventDefault(); movePlayer(1, 0); }
    if (e.key === ' ' && game.levelComplete) { e.preventDefault(); advanceLevel(); }
    if (e.key === 'r' || e.key === 'R') { initGame(); game.running = true; startScreen.classList.add('hidden'); document.getElementById('gate-display').classList.remove('hidden'); startMusic(); }
});

// Touch — swipe
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (game.over) { initGame(); game.running = true; startMusic(); return; }
    if (game.levelComplete) { advanceLevel(); return; }
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchend', e => {
    e.preventDefault();
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 15) return; // too small
    if (absDx > absDy) {
        movePlayer(dx > 0 ? 1 : -1, 0);
    } else {
        movePlayer(0, dy > 0 ? 1 : -1);
    }
}, { passive: false });

canvas.addEventListener('click', () => {
    if (game.over) { initGame(); game.running = true; startMusic(); }
    if (game.levelComplete) { advanceLevel(); }
});

document.addEventListener('touchmove', e => {
    if (e.target === canvas) e.preventDefault();
}, { passive: false });
// Init
async function init() {
    await Promise.all([
        loadImage('boxArt', CUSTOM_ASSETS.boxArtImage),
        loadImage('startArea', CUSTOM_ASSETS.startAreaImage),
        loadImage('terminalObs1', CUSTOM_ASSETS.terminalObs1),
        loadImage('terminalObs2', CUSTOM_ASSETS.terminalObs2),
        loadImage('terminalObs3', CUSTOM_ASSETS.terminalObs3),
        loadImage('runwayObs1', CUSTOM_ASSETS.runwayObs1),
        loadImage('runwayObs2', CUSTOM_ASSETS.runwayObs2),
        loadImage('runwayObs3', CUSTOM_ASSETS.runwayObs3),
        loadImage('collectible', CUSTOM_ASSETS.collectibleImage),
        loadImage('gateFilled', CUSTOM_ASSETS.gateFilledImage),
        loadImage('passenger0', CUSTOM_ASSETS.playerImages[0]),
        loadImage('passenger1', CUSTOM_ASSETS.playerImages[1]),
        loadImage('passenger2', CUSTOM_ASSETS.playerImages[2]),
        loadImage('passenger3', CUSTOM_ASSETS.playerImages[3]),
        loadImage('passenger4', CUSTOM_ASSETS.playerImages[4]),
        loadImage('checkpoint', CUSTOM_ASSETS.checkpointImage),
        loadImage('siren', CUSTOM_ASSETS.sirenImage),
        loadImage('nps', CUSTOM_ASSETS.npsImage),
    ]);
    if (images.boxArt) {
        document.getElementById('box-art').src = CUSTOM_ASSETS.boxArtImage;
        document.getElementById('box-art-container').classList.remove('hidden');
        startScreen.classList.add('has-box-art');
    }
    loadSound('move', CUSTOM_ASSETS.moveSound);
    loadSound('crash', CUSTOM_ASSETS.crashSound);
    loadSound('gate', CUSTOM_ASSETS.gateSound);
    loadSound('collect', CUSTOM_ASSETS.collectSound);
    loadSound('levelUp', CUSTOM_ASSETS.levelUpSound);
    loadMusic(CUSTOM_ASSETS.backgroundMusic);
    initGame();
    requestAnimationFrame(gameLoop);
}
init();
</script>
